name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_snapshot:
        description: 'Publish a 0.0.0-<sha> snapshot tarball to the workflow run'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # Skip the release commit that the bot itself just pushed back.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: rn-ds-bot
          GIT_AUTHOR_EMAIL: rn-ds-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: rn-ds-bot
          GIT_COMMITTER_EMAIL: rn-ds-bot@users.noreply.github.com
        run: ./tools/release.sh ${{ inputs.publish_snapshot }}
